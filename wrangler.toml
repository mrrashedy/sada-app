# Cloudflare Pages — wrangler.toml
# This configures bindings for Pages Functions (functions/api/*.js)
# Deploy: npx wrangler pages deploy dist

name = "sada-app"
compatibility_date = "2024-09-01"
pages_build_output_dir = "dist"

# ── KV Namespaces ──
# Set up via CLI then uncomment and fill IDs:
#   npx wrangler kv namespace create TRANSLATIONS
#   npx wrangler kv namespace create FEED_CACHE
#
# [[kv_namespaces]]
# binding = "TRANSLATIONS"
# id = "<your-translations-kv-id>"
#
# [[kv_namespaces]]
# binding = "FEED_CACHE"
# id = "<your-feed-cache-kv-id>"

# ── Workers AI ──
[ai]
binding = "AI"

# ── Environment Variables ──
# Set via Cloudflare Dashboard > Pages > Settings > Environment Variables:
#   SUPABASE_URL = https://your-project.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY = eyJ...
#   CRON_SECRET = <random-secret-for-cron-endpoint>
#
# Client-side (prefixed VITE_):
#   VITE_SUPABASE_URL = https://your-project.supabase.co
#   VITE_SUPABASE_ANON_KEY = eyJ...
