name = "sada-cron"
main = "index.js"
compatibility_date = "2024-09-01"

# ── Durable Objects ──
# Workers Paid unlocks DO alarms for sub-minute scheduling.
[[durable_objects.bindings]]
name = "REFRESHER"
class_name = "Refresher"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Refresher"]

# ── Failsafe cron ──
# Minimum 1 minute on every plan. This re-arms the DO alarm if it stops.
[triggers]
crons = ["* * * * *"]
